<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - JobSeek</title>
    <link rel="icon" type="image/png" href="/img/Logo.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/auth.css">
    <!-- styles moved to /css/auth.css -->
</head>
<body>
<div class="split">
    <div class="left">
        <img class="logo-join-us" src="/img/LoginJoinUs.png" alt="" />
    </div>
    <div class="right">
        <div class="card">
            <div class="logo">
                   <a th:href="@{/}" title="Home">
                    <img src="/img/Logo.png" class="logo-circle" alt="JobSeek Logo">
                </a>
                <div>
                    <div class="logo-title">JobSeek</div>
                    <div class="muted-small">Create your account</div>
                </div>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm">
                <div class="form-column">
                    <label class="form-label required" for="email">Email Address</label>
                    <input class="form-control" id="email" th:field="*{email}" placeholder="lengsaroth9@gmail.com" required />
                    <label class="form-label required" for="password">Password</label>
                    <div class="password-wrapper">
                        <input class="form-control" type="password" id="password" th:field="*{password}" placeholder="@123456" required />
                        <button type="button" class="password-toggle" aria-pressed="false" title="Show password">
                            <i class="fa-solid fa-eye" aria-hidden="true"></i>
                            <i class="fa-solid fa-eye-slash" aria-hidden="true" style="display:none"></i>
                        </button>
                    </div>
                    <label class="form-label required" for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input class="form-control" type="password" id="confirmPassword" name="confirmPassword" placeholder="@123456" required />
                        <button type="button" class="password-toggle" aria-pressed="false" title="Show password">
                            <i class="fa-solid fa-eye" aria-hidden="true"></i>
                            <i class="fa-solid fa-eye-slash" aria-hidden="true" style="display:none"></i>
                        </button>
                    </div>
                </div>

                    <div class="form-group">
                        <label class="form-label required">Account type</label>
                        <div class="select-wrapper">
                            <div class="custom-select" id="customUserType">
                                <button type="button" class="custom-select-button" aria-haspopup="listbox" aria-expanded="false">
                                    <span class="selected-text">Select account type</span>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                        <path d="M19.5 8.25L12 15.75 4.5 8.25" stroke="#1f3f8a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                                <ul class="custom-select-menu" role="listbox" tabindex="-1">
                                    <li class="custom-select-item disabled">Select account type</li>
                                    <li th:each="ut : ${usersTypes}"
                                        th:data-value="${ut.userTypeId}"
                                        th:text="${ut.userTypeName}"
                                        class="custom-select-item" role="option"></li>
                                </ul>
                            </div>
                            <input type="hidden" th:field="*{userTypeId.userTypeId}" id="userTypeInput" required />
                        </div>
                    </div>

                <span id="email-error" class="error" th:if="${error}" th:text="${error}"></span>

                <button type="submit" id="submitBtn" class="btn">Create Account</button>
            </form>

            <p class="auth-small">Already have an account? <a class="auth-link" th:href="@{/login}">Sign in</a></p>
        </div>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
