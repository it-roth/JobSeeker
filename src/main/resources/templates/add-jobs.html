<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Job - Job Portal</title>
    <link rel="icon" type="image/png" th:href="@{/img/Logo.png}" href="/img/Logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link th:rel="stylesheet" type="text/css" media="all" th:href="@{/summernote/summernote-lite.min.css}" />
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <link rel="stylesheet" th:href="@{/css/notifications.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
        }

        /* Job form card */
        .job-form {
            max-width: 850px;
            width: 100%;
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(13, 38, 76, 0.06);
        }

        /* Form title section */
        .form-title {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #0a2473 0%, #1e3a8a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem;
            box-shadow: 0 4px 16px rgba(10, 36, 115, 0.15);
        }

        .icon-circle i {
            font-size: 1.25rem;
            color: white;
        }

        .form-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0a2473;
            margin: 0 0 0.25rem 0;
        }

        .form-title p {
            font-size: 0.875rem;
            color: #6b7280;
            margin: 0;
        }

        /* Form sections */
        .form-section {
            margin-bottom: 1.5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1.5px solid #e5e7eb;
        }

        .section-icon {
            color: #0a2473;
            font-size: 0.95rem;
        }

        .section-label {
            font-size: 0.8rem;
            color: #374151;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin: 0;
            text-transform: uppercase;
        }

        /* Summernote editor adjustments */
        #content {
            display: none;
            /* Hide the original textarea */
        }

        .note-editor {
            border: 1.5px solid #e5e7eb !important;
            border-radius: 8px !important;
        }

        .note-editor:focus-within {
            border-color: #0a2473 !important;
            box-shadow: 0 0 0 3px rgba(10, 36, 115, 0.1) !important;
        }

        .note-toolbar {
            background-color: #f9fafb !important;
            border-bottom: 1.5px solid #e5e7eb !important;
        }

        .note-editable {
            background-color: #ffffff;
            min-height: 200px;
        }

        /* Form action buttons */
        .form-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .btn-save {
            background: #ff5a1f;
            color: #fff;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .back-cancel {
            color: #0a2647;
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-block;
            margin-bottom: 1rem;
            transition: color 0.3s;
        }

        .back-cancel:hover {
            color: #ff4d3d;
        }

        .back-cancel i {
            margin-right: 0.25rem;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }

            .job-form {
                padding: 1.25rem;
            }
        }
    </style>
</head>

<body>

    <div class="job-form">
        <a th:href="@{/recruiter/dashboard}" class="back-cancel"><i class="fas fa-angle-left"></i> Back to Dashboard</a>
        <div class="form-title">
            <div class="icon-circle"><i class="fas fa-briefcase"></i></div>
            <h1>Post New Job</h1>
            <p>Fill in the job details below</p>
        </div>

        <form id="job-main-form" th:action="@{/dashboard/addNew}" th:object="${jobPostActivity}" method="post">
            <input hidden type="text" th:field="*{jobPostId}">
            <input hidden type="text" th:field="*{jobLocationId.id}">
            <input hidden type="text" th:field="*{jobCompanyId.id}">

            <!-- Job Details Section -->
            <div class="form-section">
                <div class="section-header">
                    <span class="section-icon"><i class="fas fa-info-circle"></i></span>
                    <h4 class="section-label">Job Details</h4>
                </div>

                <div style="margin-bottom: 0.75rem;">
                    <input id="title" type="text" th:field="*{jobTitle}" class="form-control-hero"
                        placeholder="Job Title">
                </div>

                <div class="form-row-3" style="margin-top:0.75rem;">
                    <div>
                        <select id="type" th:field="*{jobType}" class="form-control-hero">
                            <option value="">Employment Type</option>
                            <option th:value="Full-time">Full-time</option>
                            <option th:value="Part-time">Part-time</option>
                            <option th:value="Freelance">Freelance</option>
                            <option th:value="Internship">Internship</option>
                        </select>
                    </div>
                    <div>
                        <select id="remote" th:field="*{remote}" class="form-control-hero">
                            <option value="">Select Remote Type</option>
                            <option th:value="Remote-Only">Remote-Only</option>
                            <option th:value="Office-Only">Office-Only</option>
                            <option th:value="Partial-Remote">Partial-Remote</option>
                        </select>
                    </div>
                    <div>
                        <input id="salary" th:field="*{salary}" type="text" class="form-control-hero"
                            placeholder="Salary">
                    </div>
                </div>
            </div>

            <!-- Description Section -->
            <div class="form-section">
                <div class="section-header">
                    <span class="section-icon"><i class="fas fa-align-left"></i></span>
                    <h4 class="section-label">Description</h4>
                </div>

                <div style="margin-top:0.75rem;">
                    <textarea type="text" rows="4" id="content" placeholder="Job Description"
                        th:field="*{descriptionOfJob}" autocomplete="off"></textarea>
                </div>
            </div>

            <!-- Location Section -->
            <div class="form-section">
                <div class="section-header">
                    <span class="section-icon"><i class="fas fa-map-marker-alt"></i></span>
                    <h4 class="section-label">Location</h4>
                </div>

                <div class="form-row-3" style="margin-top:0.75rem;">
                    <div>
                        <input th:field="*{jobLocationId.city}" id="city" type="text" class="form-control-hero"
                            placeholder="City">
                    </div>
                    <div>
                        <input id="state" th:field="*{jobLocationId.state}" type="text" class="form-control-hero"
                            placeholder="State">
                    </div>
                    <div>
                        <input id="country" th:field="*{jobLocationId.country}" type="text" class="form-control-hero"
                            placeholder="Country">
                    </div>
                </div>
            </div>

            <!-- Company Section -->
            <div class="form-section">
                <div class="section-header">
                    <span class="section-icon"><i class="fas fa-building"></i></span>
                    <h4 class="section-label">Company</h4>
                </div>

                <div style="margin-top:0.75rem;">
                    <input id="companyName" th:field="*{jobCompanyId.name}" type="text" class="form-control-hero"
                        placeholder="Company Name">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" name="submit" class="btn-save"><i class="fas fa-save"></i>&nbsp;Save Job</button>
            </div>
        </form>

</body>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script type="text/javascript" th:src="@{/summernote/summernote-lite.min.js}"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Initialize Summernote
        if (typeof $ !== 'undefined' && $.fn.summernote) {
            $('#content').summernote({
                height: 200,
                placeholder: 'Enter job description here...',
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
        }
    });
</script>
<script th:src="@{/js/notifications.js}"></script>

</html>
